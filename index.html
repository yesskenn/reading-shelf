<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
    />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

    <link rel="stylesheet" href="style.css"/>
    <title>Library of Web and UI Resources</title>

</head>
<body>
    <div class="wrapper">
    <header><nav></nav>
    <H1>Web and UI Resource Library</H1>
    </header>
    <main>
        
        
        <div id="sidebar">
        <button id="newBook-btn">Add A New Book</button>
        </div>
        <div id="publicLibrary">
        
        
        <div id="bookForm">
        <form id="frm" class="getNewBook bookCover">
            <label for="title">Book Title
                <input type="text" name="title" id="title"/></label>
            <label for="author">Author
                <input type="text" name="author" id="author"/></label>
                <label for="topic">Topic <em>(separate with commas)</em>
                <input type="text" name="topic" id="topic"/></label>
            <label for="format">Format
                <input type="text" name="format" id="format"/></label>
            <label for="pages">Pages
                <input type="number" name="pages" id="pages"/></label>
            <label for="didRead">Did you read it?
                <input type="checkbox" name="didRead" id="didRead"/></label>
            <input type="submit" id="submit-btn" value= "Add To Shelf" />
        </form>
        </div>
        </div>

  </main>
    <footer>
  By Yessi Kenney &hearts; 2026
    </footer>
    </div>
    <script type="text/javascript" src="script.js"> </script>
</body>
</html>
